services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bidpilot-db
    environment:
      POSTGRES_USER: bidpilot
      POSTGRES_PASSWORD: bidpilot
      POSTGRES_DB: bidpilot
    ports:
      - "5433:5432"
    volumes:
      - bidpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bidpilot_pgdata:
